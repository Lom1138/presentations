<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AE Presentation (Seamless Reverse)</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        video { 
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh; object-fit: contain;
            cursor: none;
        }
        #reverseVideo { visibility: hidden; }

        #loadingScreen {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loading-text {
            font-size: 1.2rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .progress-container {
            display: flex;
            gap: 20px;
            font-family: monospace;
            font-size: 1rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <video id="forwardVideo" preload="auto"></video>
    <video id="reverseVideo" preload="auto"></video>

    <div id="loadingScreen">
        <div class="loading-text">Loading Presentation</div>
        <div class="progress-container">
            <div id="forwardProgress">Forward: 0%</div>
            <div id="reverseProgress">Reverse: 0%</div>
        </div>
    </div>

    <script>
        const forwardVideo = document.getElementById('forwardVideo');
        const reverseVideo = document.getElementById('reverseVideo');
        const loadingScreen = document.getElementById('loadingScreen');
        
        const forwardProgressText = document.getElementById('forwardProgress');
        const reverseProgressText = document.getElementById('reverseProgress');

        // --- EDIT YOUR TIMESTAMPS HERE (in seconds) ---
        const cuePoints = [0, 1, 2, 3, 4, 5]; 
        
        let currentCue = 0;
        let targetCue = 0;
        let isPlaying = false;
        let videoDuration = 0;
        let isReverseVideoAvailable = true;
        let presentationReady = false; // Prevents keys until loaded
        let playbackInterval = null;

        let reverseSeekHandler = null;
        let forwardSeekHandler = null;

        function fetchVideoAsBlob(url, progressElement) {
            return new Promise((resolve) => {
                const xhr = new XMLHttpRequest();
                xhr.open('GET', url, true);
                xhr.responseType = 'blob';

                xhr.onprogress = function(event) {
                    if (event.lengthComputable) {
                        const percentComplete = Math.round((event.loaded / event.total) * 100);
                        progressElement.innerText = `${url.split('.')[0]}: ${percentComplete}%`;
                    }
                };

                xhr.onload = function() {
                    if (this.status === 200) {
                        const videoBlob = this.response;
                        const videoObjectURL = URL.createObjectURL(videoBlob);
                        resolve({ success: true, url: videoObjectURL });
                    } else {
                        resolve({ success: false });
                    }
                };

                xhr.onerror = function() {
                    resolve({ success: false });
                };

                xhr.send();
            });
        }

        async function loadPresentation() {
            const [forwardResult, reverseResult] = await Promise.all([
                fetchVideoAsBlob('animation_forward.mp4', forwardProgressText),
                fetchVideoAsBlob('animation_reversed.mp4', reverseProgressText)
            ]);

            if (forwardResult.success) {
                forwardVideo.src = forwardResult.url;
            } else {
                alert("Critical Error: Could not load the main presentation video.");
                return;
            }

            if (reverseResult.success) {
                reverseVideo.src = reverseResult.url;
            } else {
                console.warn('Reversed video not found. Fallback to "jump back" navigation enabled.');
                isReverseVideoAvailable = false;
                reverseVideo.style.display = 'none';
                reverseProgressText.innerText = 'Reverse: N/A';
            }

            setTimeout(() => {
                loadingScreen.style.display = 'none';
                presentationReady = true;
            }, 500);
        }

        forwardVideo.addEventListener('loadedmetadata', () => {
            videoDuration = forwardVideo.duration;
            forwardVideo.currentTime = cuePoints[0];
        });

        // --- THE SNAP MECHANIC ---
        function snapToCue(targetIndex) {
            clearInterval(playbackInterval);
            forwardVideo.pause();
            reverseVideo.pause();
            
            if (reverseSeekHandler) reverseVideo.removeEventListener('seeked', reverseSeekHandler);
            if (forwardSeekHandler) forwardVideo.removeEventListener('seeked', forwardSeekHandler);
            
            currentCue = targetIndex;
            targetCue = targetIndex;
            isPlaying = false;
            
            forwardVideo.currentTime = cuePoints[currentCue];
            forwardVideo.style.visibility = 'visible';
            reverseVideo.style.visibility = 'hidden';
        }

        function playToNextCue() {
            if (isPlaying) {
                snapToCue(Math.max(currentCue, targetCue));
                return;
            }

            if (currentCue < cuePoints.length - 1) {
                isPlaying = true;
                targetCue = currentCue + 1;
                
                forwardVideo.style.visibility = 'visible';
                if (isReverseVideoAvailable) reverseVideo.style.visibility = 'hidden';
                
                const nextCueTime = cuePoints[targetCue];
                forwardVideo.play();
                
                playbackInterval = setInterval(() => {
                    if (forwardVideo.currentTime >= nextCueTime) {
                        snapToCue(targetCue);
                    }
                }, 10);
            }
        }
        
        function playToPreviousCue() {
            if (isPlaying) {
                snapToCue(Math.min(currentCue, targetCue));
                return;
            }

            if (currentCue > 0) {
                isPlaying = true;
                targetCue = currentCue - 1;
                
                const reverseStartTime = videoDuration - cuePoints[currentCue];
                const reverseEndTime = videoDuration - cuePoints[targetCue];
                
                reverseVideo.currentTime = reverseStartTime;

                reverseSeekHandler = () => {
                    reverseSeekHandler = null; 
                    if (!isPlaying) return;

                    reverseVideo.style.visibility = 'visible';
                    forwardVideo.style.visibility = 'hidden';
                    reverseVideo.play();

                    playbackInterval = setInterval(() => {
                        if (reverseVideo.currentTime >= reverseEndTime) {
                            clearInterval(playbackInterval);
                            reverseVideo.pause();
                            
                            forwardVideo.currentTime = cuePoints[targetCue];

                            forwardSeekHandler = () => {
                                forwardSeekHandler = null;
                                if (!isPlaying) return;
                                snapToCue(targetCue);
                            };
                            forwardVideo.addEventListener('seeked', forwardSeekHandler, { once: true });
                        }
                    }, 10);
                };
                
                reverseVideo.addEventListener('seeked', reverseSeekHandler, { once: true });
            }
        }
        
        function jumpToPreviousCue() {
            if (isPlaying) {
                snapToCue(Math.min(currentCue, targetCue));
                return;
            }
            if (currentCue > 0) {
                currentCue--;
                targetCue = currentCue;
                forwardVideo.currentTime = cuePoints[currentCue];
            }
        }

        function handleKeyPress(event) {
            if (!presentationReady) return;

            // Fullscreen Toggle
            if (event.key.toLowerCase() === 'f') {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(e => console.log(e));
                } else {
                    document.exitFullscreen();
                }
                return;
            }

            if (event.key === 'ArrowRight' || event.key === ' ' || event.key === 'PageDown') { 
                event.preventDefault();
                playToNextCue();
            }
            if (event.key === 'ArrowLeft' || event.key === 'PageUp') { 
                event.preventDefault();
                if (isReverseVideoAvailable) {
                    playToPreviousCue();
                } else {
                    jumpToPreviousCue();
                }
            }
        }
        
        document.addEventListener('keydown', handleKeyPress);

        loadPresentation();
    </script>
</body>
</html>
